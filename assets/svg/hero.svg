<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ASO BUILDS - Software Programmer and AI Native">
  <defs>
    <!-- Aurora gradients -->
    <radialGradient id="aurora1" cx="25%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="75%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow for text -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glass card -->
    <filter id="glass-blur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <!-- Clip -->
    <clipPath id="card-clip">
      <rect x="0" y="0" width="900" height="320" rx="16"/>
    </clipPath>
    <!-- Animated gradient for border -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.5;0.15;0.5" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Particle dots -->
    <circle id="dot" r="1.2" fill="#10B981" opacity="0.5"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#0F172A" rx="16"/>

  <!-- Aurora layers - animated -->
  <g clip-path="url(#card-clip)">
    <ellipse cx="200" cy="140" rx="320" ry="200" fill="url(#aurora1)">
      <animateTransform attributeName="transform" type="translate" values="0,0;30,20;-20,10;0,0" dur="22s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="700" cy="180" rx="280" ry="180" fill="url(#aurora2)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-25,-15;20,25;0,0" dur="28s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="80" rx="350" ry="160" fill="url(#aurora3)">
      <animateTransform attributeName="transform" type="translate" values="0,0;15,30;-10,-20;0,0" dur="34s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Grid lines - terminal feel -->
    <g opacity="0.04" stroke="#10B981" stroke-width="0.5">
      <line x1="0" y1="40" x2="900" y2="40"/>
      <line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="0" y1="280" x2="900" y2="280"/>
      <line x1="100" y1="0" x2="100" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/>
      <line x1="400" y1="0" x2="400" y2="320"/>
      <line x1="500" y1="0" x2="500" y2="320"/>
      <line x1="600" y1="0" x2="600" y2="320"/>
      <line x1="700" y1="0" x2="700" y2="320"/>
      <line x1="800" y1="0" x2="800" y2="320"/>
    </g>

    <!-- Floating particles -->
    <circle cx="60" cy="80" r="1.5" fill="#10B981" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;60;80" dur="6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="200" r="1" fill="#F43F5E" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;175;200" dur="8s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="40" r="1.2" fill="#6366F1" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="7s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;20;40" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="60" r="1" fill="#10B981" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="9s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;40;60" dur="9s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="260" r="1.3" fill="#F43F5E" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="10s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="260;240;260" dur="10s" begin="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Terminal prompt line top -->
    <text x="32" y="44" font-family="'Courier New', monospace" font-size="11" fill="#10B981" opacity="0.6">
      <tspan>~/asobuilds</tspan>
      <tspan fill="#6366F1" opacity="0.8"> on</tspan>
      <tspan fill="#F43F5E"> main</tspan>
      <tspan fill="#64748B"> ❯</tspan>
    </text>

    <!-- Cursor blink after prompt -->
    <rect x="205" y="33" width="6" height="12" fill="#10B981" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Main name -->
    <text x="32" y="130" font-family="'Courier New', monospace" font-size="56" font-weight="700" fill="#F8FAFC" letter-spacing="-1" filter="url(#glow-soft)">
      ASO
      <tspan fill="#10B981" filter="url(#glow-green)"> BUILDS</tspan>
    </text>

    <!-- Tagline -->
    <text x="34" y="165" font-family="'Courier New', monospace" font-size="14" fill="#94A3B8" letter-spacing="0.5">
      Crafting intelligent systems with Go, Rust &amp; Python · AI Native · Solution Builder
    </text>

    <!-- Divider line -->
    <line x1="32" y1="185" x2="868" y2="185" stroke="#1E293B" stroke-width="1"/>
    <line x1="32" y1="185" x2="200" y2="185" stroke="#10B981" stroke-width="1" opacity="0.5">
      <animate attributeName="x2" values="32;300;32" dur="5s" repeatCount="indefinite"/>
    </line>

    <!-- Stack pills row -->
    <!-- Go -->
    <rect x="32" y="200" width="44" height="22" rx="4" fill="#0F172A" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="54" y="215" font-family="'Courier New', monospace" font-size="10" fill="#10B981" text-anchor="middle">Go</text>

    <!-- Rust -->
    <rect x="84" y="200" width="44" height="22" rx="4" fill="#0F172A" stroke="#F43F5E" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="106" y="215" font-family="'Courier New', monospace" font-size="10" fill="#F43F5E" text-anchor="middle">Rust</text>

    <!-- Python -->
    <rect x="136" y="200" width="58" height="22" rx="4" fill="#0F172A" stroke="#6366F1" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="165" y="215" font-family="'Courier New', monospace" font-size="10" fill="#6366F1" text-anchor="middle">Python</text>

    <!-- AI/ML -->
    <rect x="202" y="200" width="46" height="22" rx="4" fill="#0F172A" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="225" y="215" font-family="'Courier New', monospace" font-size="10" fill="#10B981" text-anchor="middle">AI/ML</text>

    <!-- Stat blocks right side -->
    <g transform="translate(620, 90)">
      <!-- Block 1 -->
      <rect x="0" y="0" width="110" height="54" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="55" y="22" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#10B981" text-anchor="middle" filter="url(#glow-green)">AI</text>
      <text x="55" y="40" font-family="'Courier New', monospace" font-size="9" fill="#64748B" text-anchor="middle">Current Focus</text>

      <!-- Block 2 -->
      <rect x="120" y="0" width="110" height="54" rx="8" fill="#1E293B" stroke="#F43F5E" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="175" y="22" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#F43F5E" text-anchor="middle">NG</text>
      <text x="175" y="40" font-family="'Courier New', monospace" font-size="9" fill="#64748B" text-anchor="middle">Based in Africa</text>

      <!-- Block 3 -->
      <rect x="60" y="68" width="110" height="54" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="115" y="90" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#6366F1" text-anchor="middle">OSS</text>
      <text x="115" y="108" font-family="'Courier New', monospace" font-size="9" fill="#64748B" text-anchor="middle">Open Source</text>
    </g>

    <!-- Social links bottom right -->
    <text x="620" y="268" font-family="'Courier New', monospace" font-size="10" fill="#475569">
      <tspan fill="#10B981">gh/</tspan>Asobuilds
      <tspan dx="16" fill="#F43F5E">x/</tspan>Asobuilds
      <tspan dx="16" fill="#6366F1">in/</tspan>agene-sunday
    </text>

    <!-- Bottom bar -->
    <rect x="0" y="306" width="900" height="14" fill="#0B1120" opacity="0.8"/>
    <text x="32" y="317" font-family="'Courier New', monospace" font-size="8" fill="#334155">
      © 2025 ASO BUILDS · Software Programmer · AI Native · Solution Builder
    </text>

    <!-- Border glow frame -->
    <rect x="1" y="1" width="898" height="318" rx="15" fill="none" stroke="url(#border-grad)" stroke-width="1"/>
  </g>
</svg>
