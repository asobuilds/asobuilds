<svg viewBox="0 0 900 24" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <defs>
    <linearGradient id="sep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#10B981" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.5;0.15;0.5" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#6366F1" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="12" x2="900" y2="12" stroke="url(#sep-grad)" stroke-width="1"/>
  <circle cx="450" cy="12" r="3" fill="#10B981" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
